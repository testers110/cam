<header>

<main id="content">

<script>
  // ==================== CONFIG ====================
  const API_URL = "https://feed.camsoda.com/api/v1/browse/online_embed?id=bewse2&cmp=CMP_HERE&length=200&gender=f";

  // Popular tags (exact or near-exact match to API tags array)
  const tagSections = [
    { title: "Latina",         key: "latina" },
    { title: "Milf",           key: "milf" },
    { title: "Teen 18+",       key: "teen 18" },
    { title: "Big Ass",        key: "big-ass" },
    { title: "Lovense",        key: "lovense" },
    { title: "Toys",           key: "toys" },
    { title: "Anal",           key: "anal" },
    { title: "Squirt",         key: "squirt" },
    { title: "Ebony",          key: "ebony" },
    { title: "Petite",         key: "petite" }
  ];

  // ==================== HELPER FUNCTIONS ====================
  function normalize(str) {
    return str.toLowerCase().replace(/[-\s]+/g, '');
  }

  function matchesTag(model, key) {
    if (!model.tags || !Array.isArray(model.tags)) return false;
    const k = normalize(key);
    return model.tags.some(t => {
      const tt = normalize(t);
      return tt === k || t.toLowerCase().includes(key.toLowerCase());
    });
  }

  function createCard(room) {
    const card = document.createElement("a");
    card.className = "card";
    card.href = room.link || "#";
    card.target = "_blank";
    card.rel = "noopener noreferrer";

    const streamDiv = document.createElement("div");
    streamDiv.className = "stream-container";

    const img = document.createElement("img");
    img.src = room.thumb || "https://media.livemediahost.com/assets/img/blurred/4x3/71.webp";
    img.alt = `${room.username} live cam`;
    img.loading = "lazy";

    const badge = document.createElement("div");
    badge.className = "live-badge";
    badge.textContent = "LIVE";

    streamDiv.appendChild(img);
    streamDiv.appendChild(badge);

    const info = document.createElement("div");
    info.className = "info";

    const username = document.createElement("div");
    username.className = "username";
    username.textContent = room.username || "Live Model";

    const viewers = document.createElement("div");
    viewers.className = "viewers";
    viewers.textContent = `${room.viewers || 0} viewers online`;

    info.appendChild(username);
    info.appendChild(viewers);

    card.appendChild(streamDiv);
    card.appendChild(info);
    return card;
  }

  // ==================== FETCH & GROUP ====================
  async function loadAll() {
    const content = document.getElementById("content");
    content.innerHTML = '<div class="message">Loading live female cams by tags<span style="color:#ff3366;">...</span></div>';

    try {
      const res = await fetch(API_URL, { mode: "cors" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      let allModels = data.results || [];

      if (allModels.length === 0) throw new Error("No models");

      // Group by tags
      const grouped = {};
      tagSections.forEach(section => {
        grouped[section.key] = allModels.filter(model => matchesTag(model, section.key));
      });

      // Clear loading
      content.innerHTML = `<div class="note">Models may appear in multiple tags • Updated live</div>`;

      // Render each section
      tagSections.forEach(section => {
        const models = grouped[section.key];
        if (models.length === 0) return;

        const sectionDiv = document.createElement("div");
        sectionDiv.className = "section";

        const h2 = document.createElement("h2");
        h2.textContent = `Live ${section.title} Females`;
        sectionDiv.appendChild(h2);

        const grid = document.createElement("div");
        grid.className = "grid";

        // Show all (usually 10–50 per tag) – no pagination needed
        models.slice(0, 24).forEach(model => {
          grid.appendChild(createCard(model));
        });

        sectionDiv.appendChild(grid);
        content.appendChild(sectionDiv);
      });

      // If nothing rendered
      if (content.children.length <= 1) {
        content.innerHTML += '<div class="message">No tagged models right now. Try again soon!</div>';
      }

    } catch (err) {
      console.warn("API error → using demo data", err);
      content.innerHTML = '<div class="message">Using demo data (real API temporarily unavailable)</div>';

      // Demo data with real structure + tags
      const demoModels = [
        { username: "stefaagomez", viewers: 206, thumb: "https://media.livemediahost.com/thumbs/2795/stefaagomez.jpg", link: "https://www.camsoda.com/stefaagomez?id=bewse2", tags: ["latina","teen 18","toys","anal","big-ass"] },
        { username: "ihacoebrae",  viewers: 266, thumb: "https://media.livemediahost.com/thumbs/3370/ihacoebrae.jpg", link: "https://www.camsoda.com/ihacoebrae?id=bewse2",  tags: ["milf","big-ass","toys"] },
        { username: "michellelewis", viewers: 59, thumb: "https://media.livemediahost.com/thumbs/2004/michellelewis.jpg", link: "https://www.camsoda.com/michellelewis?id=bewse2", tags: ["lovense","squirt","ebony"] },
        { username: "darkqween23", viewers: 104, thumb: "https://media.livemediahost.com/thumbs/3954/darkqween23.jpg", link: "https://www.camsoda.com/darkqween23?id=bewse2", tags: ["ebony","big-ass","toys"] }
      ];

      const grouped = {};
      tagSections.forEach(section => {
        grouped[section.key] = demoModels.filter(m => matchesTag(m, section.key));
      });

      content.innerHTML = `<div class="note">Demo mode – real data coming soon</div>`;
      tagSections.forEach(section => {
        const models = grouped[section.key];
        if (!models.length) return;
        const sectionDiv = document.createElement("div");
        sectionDiv.className = "section";
        const h2 = document.createElement("h2");
        h2.textContent = `Live ${section.title} Females`;
        sectionDiv.appendChild(h2);
        const grid = document.createElement("div");
        grid.className = "grid";
        models.forEach(m => grid.appendChild(createCard(m)));
        sectionDiv.appendChild(grid);
        content.appendChild(sectionDiv);
      });
    }
  }

  // ==================== START ====================
  loadAll();
</script>
