  <style>
    :root {
      --pink: #ff3366;
    }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #0f0f0f;
      color: #fff;
      line-height: 1.4;
    }

    header {
      padding: 20px;
      text-align: center;
      background: #111;
      border-bottom: 1px solid #222;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: bold;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 25px rgba(255, 51, 102, 0.3);
    }

    .stream-container {
      position: relative;
      width: 100%;
      height: 210px;
      background: #000;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .live-badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: var(--pink);
      color: white;
      font-size: 12px;
      font-weight: bold;
      padding: 4px 10px;
      border-radius: 4px;
      letter-spacing: 1px;
    }

    .info {
      padding: 14px;
    }

    .username {
      font-weight: bold;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .viewers {
      font-size: 13px;
      color: #888;
    }

    .load-more {
      text-align: center;
      padding: 30px 20px;
    }

    button {
      padding: 14px 32px;
      background: var(--pink);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #ff1a4d;
    }

    .message {
      grid-column: 1 / -1;
      text-align: center;
      padding: 40px 20px;
      color: #aaa;
      font-size: 18px;
    }
  </style>
</head>
<body>

<header>

<main>

<script>

    { username: "ZaraFire", viewers: 2890, stream: "https://test-streams.mux.dev/x264_720p_1500kbs.mp4" },
    { username: "NovaSpark", viewers: 765, stream: "https://test-streams.mux.dev/x264_720p_1500kbs.mp4" },

    { username: "HazelGlow", viewers: 2765, stream: "https://test-streams.mux.dev/x264_720p_1500kbs.mp4" },
    { username: "AmberLust", viewers: 3210, stream: "https://test-streams.mux.dev/x264_720p_1500kbs.mp4" },
    { username: "DakotaX", viewers: 890, stream: "https://test-streams.mux.dev/x264_720p_1500kbs.mp4" },
    { username: "RavenTease", viewers: 5678, stream: "https://test-streams.mux.dev/x264_720p_1500kbs.mp4" },

    { username: "CrystalVixen", viewers: 2765, stream: "https://test-streams.mux.dev/x264_720p_1500kbs.mp4" }
  ];

  let rooms = [];
  let index = 0;
  const batchSize = 12;

  // ==================== CORE FUNCTIONS ====================
  async function fetchRooms() {
    const grid = document.getElementById("grid");
    grid.innerHTML = '<div class="message">Loading live models<span style="color:#ff3366;">...</span></div>';

    try {
      const res = await fetch(API_URL, { mode: "cors" });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const data = await res.json();
      rooms = data.results || data.rooms || [];

      if (rooms.length === 0) {
        throw new Error("No models returned");
      }
    } catch (err) {
      console.warn("API failed (normal for demo) → using sample data", err);
      rooms = demoRooms;
    }

    index = 0;
    grid.innerHTML = "";
    renderRooms();
  }

  function createCard(room) {
    const div = document.createElement("div");
    div.className = "card";

    const streamDiv = document.createElement("div");
    streamDiv.className = "stream-container";

    const video = document.createElement("video");
    video.src = room.stream || room.embed || "https://test-streams.mux.dev/x264_720p_1500kbs.mp4";
    video.autoplay = true;
    video.muted = true;
    video.loop = true;
    video.playsInline = true;
    video.controls = false;

    const badge = document.createElement("div");
    badge.className = "live-badge";
    badge.textContent = "LIVE";

    streamDiv.appendChild(video);
    streamDiv.appendChild(badge);

    const info = document.createElement("div");
    info.className = "info";

    const username = document.createElement("div");
    username.className = "username";
    username.textContent = room.username || "Live Model";

    const viewers = document.createElement("div");
    viewers.className = "viewers";
    viewers.textContent = `${room.viewers || room.num_users || 0} viewers online`;

    info.appendChild(username);
    info.appendChild(viewers);

    div.appendChild(streamDiv);
    div.appendChild(info);

    return div;
  }

  function renderRooms() {
    const grid = document.getElementById("grid");

    for (let i = index; i < index + batchSize && i < rooms.length; i++) {
      grid.appendChild(createCard(rooms[i]));
    }

    index += batchSize;

    // Hide button when all loaded
    if (index >= rooms.length) {
      document.querySelector(".load-more").style.display = "none";
    }
  }

  function loadMore() {
    renderRooms();
  }

  // ==================== START ====================
  fetchRooms();
</script>
